@font-face {

    src: url("FairfaxPonaHD.ttf") format("truetype");
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #0a0a0a;
    font-family: "Lexend", sans-serif;
    color: white;
    overflow: hidden;
    height: 100vh;
}

.topnav-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 85px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    pointer-events: none;
}

.topnav-inner {
    flex: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: auto;
    position: relative;
}

.nav-title {
    position: absolute;
    left: 20px;
    font-size: 28px;
    font-weight: 700;
    color: white;
    user-select: none;
    pointer-events: none;
    font-family: "Lexend", sans-serif;
    display: flex;
    align-items: center;
    gap: 12px;
}

.nav-title-pona {
    font-family: "FairfaxPona", sans-serif;
    font-size: 40px;
    color: #ffff63;
}

#resetBtn {
    color: #f0575c;
    font-family: "Lexend", sans-serif;
    font-weight: 700;
    cursor: pointer;
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    user-select: none;
    text-decoration: none;
}

#resetBtn:hover {
    text-decoration: underline;
}

.topnav {
    display: none;
    gap: 20px;
}

.navbtn {
    padding: 10px 22px;
    background: #222;
    border: 3px solid #666;
    color: white;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s ease, opacity 0.2s ease;
    user-select: none;
    font-family: "Lexend", sans-serif;
}

.navbtn:hover {
    background: #333;
}

.navbtn.hidden {
    opacity: 0;
    pointer-events: none;
}

.nav-separator {
    width: 100%;
    height: 4px;
    background: #444;
    margin-top: 6px;
    margin-bottom: 6px;
    transition: opacity 0.2s ease;
}

.nav-separator.hidden {
    opacity: 0;
}


.sorter-wrapper {
    position: fixed;
    top: 95px;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 9;
    background: #0a0a0a;
    padding-bottom: 6px;
}

.sorter-bottom {
    position: fixed;
    top: 185px;
    left: 0;
    width: 100%;
    height: 4px;
    background: #444;
    margin-top: 6px;
    margin-bottom: 6px;
    transition: none;
    z-index: 10;
}

.sorter-inner {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
}

.sorter-label {
    font-size: 18px;
    font-weight: 700;
}

.sorter-bar {
    display: flex;
    gap: 10px;
}

.sorter-btn {
    padding: 8px 18px;
    border-radius: 14px;
    font-size: 16px;
    cursor: pointer;
    background: transparent;
    border: 2px solid #666;
    color: #888;
    transition: all 0.2s ease;
    font-family: "Lexend", sans-serif;
}

.sorter-btn.active {
    border-color: white;
    color: white;
}
.collection-count {
    margin-top: 8px;
    text-align: center;
    font-family: "Lexend", sans-serif;
    font-weight: 400;
    color: white;
    font-size: 16px;
}

.hint {
    position: fixed;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 19px;
    color: #888;
    opacity: 0.9;
    font-family: "Lexend", sans-serif;
    user-select: none;
    pointer-events: none;
    display: none;
}

.empty-collection {
    font-size: 24px;
    color: #888;
    font-weight: 600;
    display: none;
    position: fixed;
    left: 0;
    width: 100%;
    text-align: center;
    pointer-events: none;
    transform: translateY(-50%);

#packLimitStatus {
    position: fixed;
    top: 105px;
    left: 0;
    width: 100%;
    text-align: center;
    color: white;
    font-family: "Lexend", sans-serif;
    font-weight: 700;
    font-size: 20px;
    pointer-events: none;
    user-select: none;
    display: none;
}

.collection-count {
    margin-bottom: 8px;
    text-align: center;
    font-family: "Lexend", sans-serif;
    font-weight: 700;
    color: white;
    font-size: 20px;
    display: block;
    user-select: none;
}


.main {
    position: absolute;
    top: 140px;
    left: 0;
    right: 0;
    bottom: 0;

    display: flex;
    justify-content: center;
    align-items: center;
}

.main.fullscreen {
    top: 0;
}

.pack-screen {
    display: flex;
    align-items: center;
    justify-content: center;
}

.pack {
    width: 240px;
    height: 340px;
    background: linear-gradient(135deg, #333, #1a1a1a);
    border: 4px solid #777;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    user-select: none;
    font-family: "Lexend", sans-serif;
}

.pack:hover {
    transform: translateY(-14px);
    box-shadow: 0 14px 30px rgba(255,255,255,0.15);
}

.cards-area {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.cards {
    display: flex;
    gap: 30px;
    justify-content: center;
}

.card {
    width: 180px;
    height: 300px;
    background: #1c1c1c;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
    color: #eee;
    transform: translateY(50px);
    opacity: 0;
    transition: transform 0.4s ease, opacity 0.4s ease, box-shadow 0.2s ease;
    border: 4px solid transparent;
    user-select: none;
    position: relative;
    z-index: 1;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 10px 24px rgba(0,0,0,0.6);
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

.card.fly {
    transition: transform 0.55s cubic-bezier(0.25, 0.1, 0.25, 1),
                opacity 0.55s ease-out;
}

.rarity-label {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 10px;
    font-family: "Lexend", sans-serif;
}

.glyph {
    font-family: "FairfaxPona";
    font-size: 90px;
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
}

.latin {
    font-size: 22px;
    font-weight: 600;
    margin-top: 10px;
    margin-bottom: 5px;
    font-family: "Lexend", sans-serif;
    color: #ffffff;
}

#addBtn {
    margin-top: 40px;
    padding: 14px 28px;
    background: #222;
    border: 3px solid #666;
    color: white;
    font-size: 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.3s ease, background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    opacity: 0;
    pointer-events: none;
    font-family: "Lexend", sans-serif;
}

#addBtn.visible {
    opacity: 1;
    pointer-events: auto;
}

#addBtn.fade-out {
    opacity: 0;
    pointer-events: none;
}

#addBtn:hover {
    background: #333;
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
}


.collection-area {
    display: none;
    width: 100%;
    height: 100%;
    overflow-y: auto;

    padding: 80px 40px 80px 40px;

    display: grid;
    grid-template-columns: repeat(5, 180px);
    justify-content: center;
    gap: 20px;

    scrollbar-width: thin;
    scrollbar-color: #555 #111;
}

.collection-area::-webkit-scrollbar {
    width: 6px;
}
.collection-area::-webkit-scrollbar-track {
    background: #111;
}
.collection-area::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 3px;
}


.rarity-core {
    border-color: #2ecc71;
}

.rarity-common {
    border-color: #3498db;
}

.rarity-uncommon {
    border-color: #f1c40f;
}

.rarity-obscure {
    border-color: #9b59b6;
}

.rarity-sandbox {
    border-color: #a32121;
}

.rarity-arcane {
    border: 4px solid transparent;
    border-radius: 16px;
    background-image:
        linear-gradient(#1c1c1c, #1c1c1c),
        conic-gradient(
            red,
            orange,
            yellow,
            green,
            cyan,
            #0083c2,
            violet,
            red
        );
    background-origin: border-box;
    background-clip: padding-box, border-box;
}

.rarity-label-core {
    color: #2ecc71;
}

.rarity-label-common {
    color: #3498db;
}

.rarity-label-uncommon {

.rarity-label-obscure {

.rarity-label-sandbox {

}

.rarity-label-arcane {
    background: linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        #0083c2,
        violet
    );
    -webkit-background-clip: text;
    color: transparent;
    border: none !important;
    text-shadow: none !important;
}
</style>
</head>

        }

const PACK_LIMIT = 5;
let packUsage = { date: "", opened: 0, resetAt: 0 };
let packTimer = null;

function getTodayString() {
    return new Date().toISOString().slice(0, 10);
}

function loadPackUsage() {
    const saved = localStorage.getItem("ponaPackUsage");
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (parsed && typeof parsed === "object") {
                packUsage = {
                    date: parsed.date || getTodayString(),
                    opened: Number(parsed.opened || 0)
                };
            }
        } catch {
            packUsage = { date: getTodayString(), opened: 0 };
        }
    } else {
        packUsage = { date: getTodayString(), opened: 0 };
    }

    const today = getTodayString();
    if (packUsage.date !== today) {
        packUsage.date = today;
        packUsage.opened = 0;
        savePackUsage();
    }
}

function savePackUsage() {
    localStorage.setItem("ponaPackUsage", JSON.stringify(packUsage));
}

function updatePackStatus() {
    const today = getTodayString();
    if (packUsage.date !== today) {
        packUsage.date = today;
        packUsage.opened = 0;
        savePackUsage();
    }

    const remaining = Math.max(0, PACK_LIMIT - packUsage.opened);
    packLimitStatus.textContent = `${remaining}/${PACK_LIMIT} packs left`;

    if (remaining <= 0) {
        hint.textContent = "Daily limit reached, check back tomorrow!";
    } else {
        hint.textContent = "Click to open a card pack!";
    }
}

function getAvailableWords() {
    return tokiPonaWords.filter(w => !collection.some(c => c.word === w));
}

function getRarityWeight(rarityName) {
    switch (rarityName) {
        case "ARCANE": return 1;
        case "SANDBOX": return 2;
        case "OBSCURE": return 3;
        case "UNCOMMON": return 5;
        case "COMMON": return 7;
        case "CORE": return 8;
        default: return 5;
    }
}

function pullUniqueWords(count) {
    const available = getAvailableWords();
    const pulled = [];

    while (pulled.length < count && available.length > 0) {
        const weighted = available.map(word => {
            const rarity = cardData[word]?.name || "COMMON";
            return { word, weight: getRarityWeight(rarity) };
        }).filter(item => item.weight > 0);

        const totalWeight = weighted.reduce((sum, item) => sum + item.weight, 0);
        if (totalWeight <= 0) break;

        let r = Math.random() * totalWeight;
        let selectedIndex = 0;
        for (let i = 0; i < weighted.length; i++) {
            r -= weighted[i].weight;
            if (r <= 0) {
                selectedIndex = i;
                break;
            }
        }

        const selectedWord = weighted[selectedIndex].word;
        pulled.push(selectedWord);
        const removeIndex = available.indexOf(selectedWord);
        if (removeIndex >= 0) available.splice(removeIndex, 1);
    }

    return pulled;
}

function renderCard(word) {
    const rarity = cardData[word];

    const card = document.createElement("div");
    card.className = "card " + rarity.borderClass;

    const rarityLabel = document.createElement("div");
    rarityLabel.className = "rarity-label " + rarity.labelClass;
    rarityLabel.textContent = rarity.name;

    const glyph = document.createElement("div");
    glyph.className = "glyph";
    glyph.textContent = word;

    const latin = document.createElement("div");
    latin.className = "latin";
    latin.textContent = rarity.customName || word;
    if (rarity.displayFontSize) {
        let fontSizeValue = String(rarity.displayFontSize).trim();
        if (/^[0-9]+$/.test(fontSizeValue)) {
            fontSizeValue += "px";
        }
        latin.style.fontSize = fontSizeValue;
    }

    card.appendChild(rarityLabel);
    card.appendChild(glyph);
    card.appendChild(latin);

    return card;
}


function positionHint() {
    if (hint.style.display === "none") return;

    const divider = document.getElementById("navSeparator");
    const dividerRect = divider.getBoundingClientRect();
    const packRect = pack.getBoundingClientRect();

    const dividerBottom = dividerRect.bottom;
    const packTop = packRect.top;

    hint.style.display = "block";
    const hintRect = hint.getBoundingClientRect();
    const hintHeight = hintRect.height;

    const center = dividerBottom + (packTop - dividerBottom) / 2;
    const top = center - hintHeight / 2;

    hint.style.top = `${top}px`;
}


function showPackScreen() {
    main.classList.remove("fullscreen");

    packScreen.style.display = "flex";
    cardsArea.style.display = "none";
    collectionArea.style.display = "none";

    topnav.style.display = "flex";
    resetBtn.style.display = "block";
    navSeparator.classList.remove("hidden");
    sorterWrapper.style.display = "none";

    navPack.classList.remove("hidden");
    navCollection.classList.remove("hidden");

    emptyCollection.style.display = "none";
    packLimitStatus.style.display = "block";
    sorterBottom.classList.add("hidden");
    updatePackStatus();
    hint.style.display = "block";
    requestAnimationFrame(positionHint);
}

function openPack() {
    if (isAnimating) return;

    updatePackStatus();
    const remaining = Math.max(0, PACK_LIMIT - packUsage.opened);
    if (remaining <= 0) {
        hint.textContent = "Daily limit reached, check back tomorrow!";
        hint.style.display = "block";
        return;
    }

    const available = getAvailableWords();
    if (available.length === 0) return;

    packUsage.opened += 1;
    packUsage.date = getTodayString();
    savePackUsage();
    updatePackStatus();

    main.classList.add("fullscreen");

    packScreen.style.display = "none";
    hint.style.display = "none";
    emptyCollection.style.display = "none";

    topnav.style.display = "none";
    resetBtn.style.display = "none";
    packLimitStatus.style.display = "none";
    navSeparator.classList.add("hidden");
    sorterWrapper.style.display = "none";
    sorterBottom.classList.add("hidden");

    cardsArea.style.display = "flex";

    addBtn.classList.remove("fade-out", "visible");

    currentPulled = pullUniqueWords(3);
    cardsContainer.innerHTML = "";

    let pulledCount = currentPulled.length;
    let cardsShown = 0;

    currentPulled.forEach((word, i) => {
        const card = renderCard(word);
        cardsContainer.appendChild(card);

        setTimeout(() => {
            card.classList.add("show");

            cardsShown++;
            if (cardsShown === pulledCount) {
                setTimeout(() => {
                    addBtn.classList.add("visible");
                }, 200);
            }
        }, 250 + i * 250);
    });
}

function renderCollection() {
    collectionArea.innerHTML = "";
    collection.forEach(entry => {
        const card = renderCard(entry.word);
        card.classList.add("show");
        collectionArea.appendChild(card);
    });
}

function showCollectionScreen() {
    if (isAnimating) return;

    main.classList.remove("fullscreen");

    packScreen.style.display = "none";
    cardsArea.style.display = "none";
    hint.style.display = "none";

    topnav.style.display = "flex";
    resetBtn.style.display = "block";
    packLimitStatus.style.display = "none";
    navSeparator.classList.remove("hidden");
    sorterWrapper.style.display = "flex";

    navPack.classList.remove("hidden");
    navCollection.classList.remove("hidden");

    setCollectionCountText();

    if (collection.length === 0) {
        emptyCollection.style.display = "block";
        positionEmptyCollectionText();
        collectionArea.style.display = "none";
    } else {
        emptyCollection.style.display = "none";
        collectionArea.style.display = "grid";
        renderCollection();
    }

    sorterBottom.classList.remove("hidden");
}


function applySort(type) {
    if (type === "time") {
        collection.sort((a, b) => (b.timeAdded || 0) - (a.timeAdded || 0));
    } else if (type === "alpha") {
        collection.sort((a, b) => a.word.localeCompare(b.word));
    } else if (type === "rarity") {
        collection.sort((a, b) => {
            const rA = cardData[a.word].rank;
            const rB = cardData[b.word].rank;
            if (rA !== rB) return rB - rA;
            return a.word.localeCompare(b.word);
        });
    }

    renderCollection();
}

sorterBar.addEventListener("click", e => {
    if (!e.target.classList.contains("sorter-btn")) return;

    document.querySelectorAll(".sorter-btn").forEach(btn =>
        btn.classList.remove("active")
    );

    e.target.classList.add("active");
    applySort(e.target.dataset.sort);
});


function animateCardsToCollection() {
    const cards = Array.from(cardsContainer.querySelectorAll(".card")).slice(0, currentPulled.length);

    topnav.style.display = "flex";
    navSeparator.classList.add("hidden");
    sorterWrapper.style.display = "none";

    navPack.classList.add("hidden");
    navCollection.classList.remove("hidden");

    const targetRect = navCollection.getBoundingClientRect();
    const targetX = targetRect.left + targetRect.width / 2;
    const targetY = targetRect.top + targetRect.height / 2;

    let finished = 0;
    const clones = [];

    cards.forEach((card, i) => {
        const rect = card.getBoundingClientRect();
        const startX = rect.left + rect.width / 2;
        const startY = rect.top + rect.height / 2;

        const dx = targetX - startX;
        const dy = targetY - startY;

        const clone = card.cloneNode(true);
        clone.style.position = "fixed";
        clone.style.left = `${rect.left}px`;
        clone.style.top = `${rect.top}px`;
        clone.style.width = `${rect.width}px`;
        clone.style.height = `${rect.height}px`;
        clone.style.margin = "0";
        clone.style.transform = "none";
        clone.style.opacity = "1";
        clone.style.transition = "transform 0.55s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.55s ease-out";
        clone.style.zIndex = "999";
        clone.classList.add("fly");

        document.body.appendChild(clone);
        card.style.visibility = "hidden";

        setTimeout(() => {
            clone.style.transform = `translate(${dx}px, ${dy}px) scale(0.35)`;
            clone.style.opacity = "0";
        }, 50 + i * 150);

        clone.addEventListener("transitionend", (event) => {
            if (event.propertyName !== "opacity") return;

            clone.remove();
            finished++;

            if (finished === cards.length) {
                cards.forEach(c => c.remove());
                cardsContainer.innerHTML = "";
                navCollection.classList.add("hidden");
                topnav.style.display = "none";
                isAnimating = false;
                showPackScreen();
            }
        }, { once: true });

        clones.push(clone);
    });

    const maxDuration = 800 + cards.length * 150;
    setTimeout(() => {
        if (finished < cards.length) {
            clones.forEach(clone => clone.remove());
            cards.forEach(c => c.remove());
            cardsContainer.innerHTML = "";
            navCollection.classList.add("hidden");
            topnav.style.display = "none";
            isAnimating = false;
            showPackScreen();
        }
    }, maxDuration + 300);
}

addBtn.addEventListener("click", () => {
    if (isAnimating) return;
    isAnimating = true;

    currentPulled.forEach(word => {
        timeCounter += 1;
        collection.push({ word, timeAdded: timeCounter });
    });

    saveCollection();

    addBtn.classList.remove("visible");
    addBtn.classList.add("fade-out");

    animateCardsToCollection();
});

resetBtn.addEventListener("click", () => {
    if (isAnimating) return;
    collection = [];
    timeCounter = 0;
    saveCollection();
    collectionArea.innerHTML = "";
    cardsContainer.innerHTML = "";
    showPackScreen();
});

pack.addEventListener("click", openPack);
navPack.addEventListener("click", showPackScreen);
navCollection.addEventListener("click", showCollectionScreen);

window.addEventListener("resize", () => {
    requestAnimationFrame(() => {
        if (packScreen.style.display !== "none") {
            positionHint();
        }
        if (emptyCollection.style.display === "block") {
            positionEmptyCollectionText();
        }
    });
});

loadCollection();
loadPackUsage();
updatePackStatus();
showPackScreen();
applySort("time");
setCollectionCountText();
</script>

</body>
</html>
